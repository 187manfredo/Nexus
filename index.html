function deleteForumPost(idx){
  if(!confirm('Post löschen?')) return;
  const cat = data.forums.categories[activeCategoryIdx];
  cat.posts.splice(idx,1);
  save(); renderForums();
}

// ====== SUPPORT ======
function renderSupportTickets(){
  const btn = document.getElementById('support-create-btn');
  if(isUser||isAdmin) btn.innerHTML = '<button class="news-add-btn" style="border-color:rgba(255,165,2,0.35);color:var(--warning);" onclick="openSupportModal()">＋ Ticket erstellen</button>';
  else btn.innerHTML = '<div style="font-size:12px;color:var(--muted);">📧 Anmelden um Support zu kontaktieren</div>';

  const list = document.getElementById('support-list');
  if(!data.supportTickets.length){
    list.innerHTML = '<div style="padding:28px;color:var(--muted);text-align:center;font-size:13px;font-style:italic;">Noch keine Support-Tickets vorhanden.</div>';
    return;
  }
  list.innerHTML = data.supportTickets.map((t,i)=>`
    <div class="support-ticket">
      <div class="support-ticket-header">
        <span class="support-ticket-status ${t.status}">${t.status==='open'?'Offen':'Geschlossen'}</span>
        <span class="support-ticket-title">${t.title}</span>
      </div>
      <div class="support-ticket-user">Von: <strong>${t.user}</strong></div>
      <div class="support-ticket-body">${t.body}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;">Erstellt: ${t.date}</div>
      ${isAdmin?`<div class="support-ticket-actions">
        <button class="edit-btn" onclick="toggleTicketStatus(${i})" style="border-color:rgba(0,229,255,0.3);color:var(--accent);">✓ ${t.status==='open'?'Schließen':'Öffnen'}</button>
        <button class="edit-btn del" onclick="deleteTicket(${i})">🗑️ Löschen</button>
      </div>`:''}
    </div>`).join('');
}
function openSupportModal(){
  const m = document.createElement('div');
  m.className = 'modal-overlay'; m.id = 'active-modal';
  m.innerHTML = `<div class="modal-box">
    <div class="modal-title">🎧 Support-Ticket erstellen</div>
    <input class="modal-input" id="st-title" placeholder="Betreff" />
    <textarea class="modal-textarea" id="st-body" placeholder="Beschreibung deines Problems..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveSupportTicket()">Einreichen</button>
    </div>
  </div>`;
  document.body.appendChild(m);
  m.addEventListener('click',e=>{ if(e.target===m) closeModal(); });
  document.getElementById('st-title').focus();
}
function saveSupportTicket(){
  const title = document.getElementById('st-title').value.trim();
  const body = document.getElementById('st-body').value.trim();
  if(!title || !body) return;
  data.supportTickets.push({id:Date.now(),user:currentUser||'Gast',title,body,status:'open',date:new Date().toLocaleDateString('de-DE')});
  save(); renderSupportTickets(); closeModal();
  const list = document.getElementById('support-list');
  list.scrollTop = 0;
}
function toggleTicketStatus(idx){
  data.supportTickets[idx].status = data.supportTickets[idx].status==='open'?'closed':'open';
  save(); renderSupportTickets();
}
function deleteTicket(idx){
  if(!confirm('Ticket löschen?')) return;
  data.supportTickets.splice(idx,1);
  save(); renderSupportTickets();
}


// ====== BOOTSCREEN ======
(function(){
  const logs = [
    '> Initialisiere NEXUS OS v3.0...',
    '> Lade Systemmodule...',
    '> Verbinde mit Firebase...',
    '> Synchronisiere Community-Daten...',
    '> Überprüfe Benutzerdaten...',
    '> Lade Community-Services...',
    '> Starte Gaming-Plattform...',
    '> Alle Systeme bereit.'
  ];
  const logEl = document.getElementById('boot-log');
  const bar = document.getElementById('boot-bar');
  const bootEl = document.getElementById('bootscreen');
  let i = 0;
  function step(){
    if(i < logs.length){
      const line = document.createElement('div');
      line.className = 'boot-log-line';
      line.style.color = i === logs.length-1 ? 'var(--success)' : 'var(--accent4)';
      line.textContent = logs[i];
      logEl.appendChild(line);
      if(logEl.children.length > 5) logEl.children[0].remove();
      bar.style.width = ((i+1)/logs.length*100)+'%';
      i++;
      setTimeout(step, 220 + Math.random()*180);
    } else {
      setTimeout(()=>{
        bootEl.classList.add('fade-out');
        setTimeout(()=>{ bootEl.style.display='none'; startPostBoot(); }, 820);
      }, 400);
    }
  }
  setTimeout(step, 300);
})();

function startPostBoot(){
  // Show welcome notification after a short delay
  setTimeout(()=>{
    showNotif('🚀','NEXUS OS gestartet','Willkommen! Bitte melde dich an oder gehe als Gast.','info');
  }, 800);
  // Show a fake system notification after 3 seconds
  setTimeout(()=>{
    showNotif('🔔','3 neue Forum-Posts','Es gibt neue Aktivität in deiner Community.','info');
  }, 4000);
}

// ====== NOTIFICATIONS ======
let notifQueue = [];
function showNotif(icon, title, msg, type='info', duration=4200){
  const container = document.getElementById('notif-container');
  const el = document.createElement('div');
  el.className = `notif type-${type}`;
  const now = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  el.innerHTML = `<div class="notif-icon">${icon}</div><div class="notif-body"><div class="notif-title">${title}</div><div class="notif-msg">${msg}</div><div class="notif-time">${now}</div></div>`;
  el.addEventListener('click', ()=>dismissNotif(el));
  container.appendChild(el);
  // Pulse the taskbar clock briefly
  const clk = document.getElementById('taskbar-clock');
  if(clk){ clk.style.borderColor='rgba(0,229,255,0.5)'; setTimeout(()=>clk.style.borderColor='',700); }
  setTimeout(()=>dismissNotif(el), duration);
}
function dismissNotif(el){
  if(!el.parentNode) return;
  el.classList.add('fade-out');
  setTimeout(()=>el.remove(), 280);
}

// ====== ONLINE USERS BAR ======
let onlineBarOpen = false;
const ONLINE_NAMES = ['CoolGamer92','ProPlayer','EventMaster','HelpWanted','NexusUser'];
function toggleOnlineBar(){
  onlineBarOpen = !onlineBarOpen;
  document.getElementById('online-bar').classList.toggle('show', onlineBarOpen);
  if(onlineBarOpen) renderOnlineBar();
}
function updateOnlineStatus(selfJoined){
  // Add current user to fake online list
  renderOnlineBar();
  const count = getOnlineCount();
  document.getElementById('online-count-label').textContent = count+' Online';
}
function getOnlineCount(){
  let base = 2 + Math.floor(Math.random()*3);
  if(isUser||isAdmin) base++;
  return base;
}
function renderOnlineBar(){
  const list = document.getElementById('online-users-list');
  let users = [];
  if(isUser && currentUser) users.push({name:currentUser, avatar:getUserAvatar(currentUser), self:true});
  if(isAdmin) users.push({name:data.adminUser||'admin', avatar:null, self:true});
  // Add some fake online users
  const extras = ONLINE_NAMES.filter(n=>n!==currentUser).slice(0,3);
  extras.forEach(n=>users.push({name:n,avatar:null}));
  list.innerHTML = users.map(u=>`
    <div class="online-user-row">
      <div class="online-dot"></div>
      <div class="online-avatar">${u.avatar?`<img src="${u.avatar}">`:'👤'}</div>
      <div class="online-uname">${u.name}${u.self?' <span style="font-size:9px;color:var(--accent);opacity:0.7;">(Du)</span>':''}</div>
    </div>`).join('');
  document.getElementById('online-count-label').textContent = users.length+' Online';
}

// ====== AVATAR ======
function getUserAvatar(username){
  const u = data.users.find(u=>u.name===username);
  return u ? u.avatar : null;
}
function updateTaskbarAvatar(avatarUrl){
  const el = document.getElementById('taskbar-avatar');
  if(!el) return;
  if(avatarUrl){
    el.innerHTML = `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  } else {
    el.textContent = '👤';
  }
}
function openProfileModal(){
  if(!isUser && !isAdmin) return;
  const user = data.users.find(u=>u.name===currentUser);
  const currentAvatar = user ? user.avatar : null;
  const m = document.createElement('div');
  m.className='modal-overlay'; m.id='active-modal';
  m.innerHTML=`<div class="modal-box" style="max-width:380px;">
    <div class="modal-title">👤 Profil — ${currentUser}</div>
    <div style="text-align:center;margin-bottom:18px;">
      <div class="avatar-upload-area" onclick="triggerAvatarUpload()" id="profile-avatar-preview">
        ${currentAvatar?`<img src="${currentAvatar}"><div class="avatar-upload-overlay">✏️ Ändern</div>`:'<span style="font-size:36px;">👤</span><div style="font-size:10px;color:var(--muted);margin-top:4px;">Foto hochladen</div>'}
      </div>
      <input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)">
      <div style="font-size:12px;color:var(--muted);">Oder Bild-URL:</div>
      <input class="modal-input" id="avatar-url-input" placeholder="https://... (Profilbild-URL)" value="${currentAvatar||''}" style="margin-top:8px;">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-save" onclick="saveUserAvatar()">💾 Speichern</button>
    </div>
  </div>`;
  document.body.appendChild(m);
  m.addEventListener('click',e=>{ if(e.target===m) closeModal(); });
}
function triggerAvatarUpload(){
  document.getElementById('avatar-file-input').click();
}
function handleAvatarUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const dataUrl = ev.target.result;
    document.getElementById('avatar-url-input').value = dataUrl;
    const preview = document.getElementById('profile-avatar-preview');
    preview.innerHTML = `<img src="${dataUrl}"><div class="avatar-upload-overlay">✏️ Ändern</div>`;
    preview.onclick = triggerAvatarUpload;
  };
  reader.readAsDataURL(file);
}
function saveUserAvatar(){
  const url = document.getElementById('avatar-url-input').value.trim();
  const user = data.users.find(u=>u.name===currentUser);
  if(user){ user.avatar = url||null; save(); }
  updateTaskbarAvatar(url||null);
  // Update forum posts avatar display
  closeModal();
  showNotif('🖼️','Profilbild gespeichert','Dein Profilbild wurde aktualisiert.','success');
}

// ====== GAME LAUNCH PLATFORM ======
function launchGame(idx){
  const g = data.games[idx];
  if(!g) return;
  document.getElementById('launch-game-emoji').textContent = g.emoji || '🎮';
  document.getElementById('launch-game-title').textContent = (g.name||'Spiel').toUpperCase();
  const frame = document.getElementById('game-launch-frame');
  // playFile (base64 data-URL) takes priority over playUrl
  const src = g.playFile || g.playUrl || '';
  if(src){
    frame.style.display='block';
    frame.src = src;
    document.getElementById('game-launch-overlay').classList.add('show');
    showNotif('🎮','Spiel gestartet','<strong>'+g.name+'</strong> wird geladen…','success');
  } else {
    frame.style.display='none';
    const overlay = document.getElementById('game-launch-overlay');
    overlay.classList.add('show');
    const placeholder = document.createElement('div');
    placeholder.className='launch-no-url';
    placeholder.innerHTML='<div class="no-url-icon">🔗</div><p>Noch keine Spieldatei hinterlegt.<br>Admin kann im Spiel-Editor eine <strong>HTML-Datei hochladen</strong> oder eine <strong>externe URL</strong> eintragen.</p><button class="guest-btn" style="width:auto;padding:9px 22px;" onclick="closeLaunchOverlay()">Zurück</button>';
    overlay.appendChild(placeholder);
  }
}
function closeLaunchOverlay(){
  const overlay = document.getElementById('game-launch-overlay');
  overlay.classList.remove('show');
  const frame = document.getElementById('game-launch-frame');
  frame.src='';
  // Remove any placeholder divs
  overlay.querySelectorAll('.launch-no-url').forEach(e=>e.remove());
}
